services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DATA_DIR=/data
    volumes:
      - app-data:/data
    ports:
      - "8080:8080"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  app-data:
